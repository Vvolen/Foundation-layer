name: Self-Evolution (Versailles Sync)

# Template for the Versailles self-evolution workflow.
# This action will:
#   1. Pull the latest META_INDEX from Vvolen/Versailles
#   2. Check for stale content (fragments older than N days without access)
#   3. Run RAPTOR consolidation if needed
#   4. Update the META_INDEX and open a PR if changes found
#
# STATUS: Template only — activate in Phase 2
#
# HOW TO ENABLE:
#   1. Uncomment the schedule trigger below
#   2. Add VERSAILLES_PAT secret (Personal Access Token with repo scope for Vvolen/Versailles)
#   3. Implement the evolution scripts referenced below

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 4 * * 0'   # 4am UTC every Sunday — uncomment to enable

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout foundation-layer
        uses: actions/checkout@v4

      - name: Checkout Versailles (the Brain repo)
        uses: actions/checkout@v4
        with:
          repository: Vvolen/Versailles
          token: ${{ secrets.VERSAILLES_PAT }}
          path: versailles

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

